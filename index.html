<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Prayer Invitation</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #fffaf0; overflow: hidden; font-family: 'Georgia', serif; }
        #wrapper { display: flex; justify-content: center; align-items: center; height: 100vh; perspective: 1000px; }

        /* The Envelope Container */
        .envelope { position: relative; width: 280px; height: 180px; background: #b8860b; cursor: pointer; transition: 0.5s; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        
        /* The Top Flap */
        .flap { position: absolute; top: 0; width: 0; height: 0; border-left: 140px solid transparent; border-right: 140px solid transparent; border-top: 100px solid #d4af37; transform-origin: top; transition: transform 0.6s ease; z-index: 3; }

        /* The Letter (Poster) inside */
        .letter { position: absolute; bottom: 0; left: 10px; width: 260px; height: 160px; background: white; transition: all 1s ease-in-out; z-index: 1; overflow: hidden; opacity: 0.5; }
        .letter img { width: 100%; height: 100%; object-fit: cover; }

        /* "Click Me" Text */
        .hint { position: absolute; bottom: -60px; width: 100%; text-align: center; color: #b8860b; font-weight: bold; animation: bounce 2s infinite; }

        /* Open State Animations */
        .open .flap { transform: rotateX(180deg); z-index: 0; }
        .open .letter { transform: translateY(-120px) scale(1.5); opacity: 1; z-index: 10; }

        /* Final Full Screen View */
        #full-poster-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; justify-content: center; align-items: center; z-index: 100; animation: fadeIn 2s forwards; }
        #full-poster-overlay img { max-width: 95%; max-height: 90vh; border: 8px solid #fff; box-shadow: 0 0 30px rgba(0,0,0,0.1); }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="wrapper">
        <div class="envelope" id="env" onclick="startReveal()">
            <div class="flap"></div>
            <div class="letter">
                <img src="https://i.postimg.cc/qvD17Fhk/photo-6161043935606803833-y.jpg" alt="Invite">
            </div>
            <div class="hint">TAP TO OPEN</div>
        </div>
    </div>

    <div id="full-poster-overlay">
        <img src="https://i.postimg.cc/qvD17Fhk/photo-6161043935606803833-y.jpg">
    </div>

    <audio id="invite-music">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startReveal() {
            const env = document.getElementById('env');
            const music = document.getElementById('invite-music');
            const overlay = document.getElementById('full-poster-overlay');

            env.classList.add('open');
            music.play();

            // Transition to full screen poster after 2 seconds
            setTimeout(() => {
                overlay.style.display = 'flex';
            }, 2500);
        }
    </script>
</body>
</html>
